name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semantic version without the v prefix
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ inputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - name: Install pinned dependencies
        run: npm ci
      - name: Run repository acceptance seam
        run: npm run check
      - name: Validate release candidate
        run: npm run release:check -- "$RELEASE_VERSION"
      - name: Prepare matching release notes
        run: npm run release:notes -- "$RELEASE_VERSION" release-notes.md
      - name: Configure release tag identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Create annotated tag
        run: git tag -a "v$RELEASE_VERSION" -m "agent-skills v$RELEASE_VERSION"
      - name: Push tag
        run: git push origin "v$RELEASE_VERSION"
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "v$RELEASE_VERSION" --verify-tag --title "agent-skills v$RELEASE_VERSION" --notes-file release-notes.md
