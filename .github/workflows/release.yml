name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semantic version without the v prefix
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install pinned dependencies
        run: npm ci
      - name: Run repository acceptance seam
        run: npm run check
      - name: Validate release candidate
        run: npm run release:check -- "${{ inputs.version }}"
      - name: Prepare matching release notes
        run: npm run release:notes -- "${{ inputs.version }}" release-notes.md
      - name: Create annotated tag
        run: git tag -a "v${{ inputs.version }}" -m "agent-skills v${{ inputs.version }}"
      - name: Push tag
        run: git push origin "v${{ inputs.version }}"
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "v${{ inputs.version }}" --verify-tag --title "agent-skills v${{ inputs.version }}" --notes-file release-notes.md
